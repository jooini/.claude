<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📚 MCP Knowledge Citation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0d1117; color: #c9d1d9;
               font-family: -apple-system, BlinkMacSystemFont, monospace; padding: 16px; }
  h1 { font-size: 18px; margin-bottom: 12px; }
  h1 a { color: #58a6ff; text-decoration: none; font-size: 12px; margin-left: 16px; font-weight: normal; }
  h2 { font-size: 13px; margin: 16px 0 8px; color: #c9d1d9; }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid #21262d; }
  th { background: #21262d; color: #c9d1d9; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.tool { color: #58a6ff; font-weight: 600; }
  .stat-row { display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; color: #8b949e; padding: 4px 0; }
  .stat-row strong { color: #c9d1d9; font-size: 14px; }
  .rate-hi { color: #56d364; }
  .rate-mid { color: #d29922; }
  .rate-lo { color: #f85149; }
  .meter { display: inline-block; width: 60px; height: 8px; background: #21262d; border-radius: 4px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
  .meter-fill { height: 100%; background: linear-gradient(90deg, #f85149, #d29922, #56d364); }
  select, button { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  button:hover { background: #21262d; }
  .meta { font-size: 11px; color: #8b949e; margin-top: 8px; }
  .empty { color: #8b949e; font-style: italic; padding: 12px; text-align: center; }
</style>
</head>
<body>
<h1>📚 MCP Knowledge Citation
  <a href="/" target="_blank">← 메인 ↗</a>
  <a href="/agent-quality" target="_blank">🎯 Agent Quality ↗</a>
  <span style="margin-left: 24px;">기간:
    <select id="days-select" onchange="reload()">
      <option value="1">1일</option>
      <option value="3">3일</option>
      <option value="7" selected>7일</option>
      <option value="14">14일</option>
      <option value="30">30일</option>
    </select>
  </span>
  <button onclick="reload()" style="margin-left: 8px;">🔄 재분석</button>
</h1>

<div class="panel">
  <h2>📊 전체 통계</h2>
  <div id="stats" class="stat-row">로딩 중...</div>
</div>

<div class="panel">
  <h2>📈 도구별 상세</h2>
  <div id="tools"></div>
</div>

<div class="panel">
  <h2>💡 침묵 실패 진단</h2>
  <div id="diagnosis" class="meta">데이터 분석 중...</div>
</div>

<script>
function rateClass(r) {
  if (r >= 0.7) return 'rate-hi';
  if (r >= 0.4) return 'rate-mid';
  return 'rate-lo';
}

function fmtPct(v) { return (v * 100).toFixed(1) + '%'; }

async function reload() {
  const days = document.getElementById('days-select').value;
  document.getElementById('stats').textContent = '로딩 중...';
  try {
    const r = await fetch('/mcp-knowledge-data?days=' + days);
    const d = await r.json();
    if (d.error) {
      document.getElementById('stats').innerHTML = '<span class="rate-lo">에러: ' + d.error + '</span>';
      return;
    }
    if (d.total_calls === 0) {
      document.getElementById('stats').innerHTML = '<span class="empty">데이터 없음 — telemetry는 새 세션부터 누적됩니다</span>';
      document.getElementById('tools').innerHTML = '';
      document.getElementById('diagnosis').innerHTML = 'PostToolUse hook 등록 직후. 다음 Claude Code 세션부터 호출이 기록됩니다.';
      return;
    }
    renderStats(d);
    renderTools(d);
    renderDiagnosis(d);
  } catch (e) {
    document.getElementById('stats').innerHTML = '<span class="rate-lo">로드 실패: ' + e + '</span>';
  }
}

function renderStats(d) {
  const r = d.overall_citation_rate;
  document.getElementById('stats').innerHTML = `
    <div>총 호출: <strong>${d.total_calls}</strong></div>
    <div>인용됨: <strong class="${rateClass(r)}">${d.total_cited}</strong> (${fmtPct(r)})</div>
    <div>빈 결과: <strong>${d.total_empty || 0}</strong></div>
    <div>에러: <strong>${d.total_errors || 0}</strong></div>
    <div style="margin-left: auto; color: #8b949e;">분석 시각: ${d.generated_at || '-'}</div>
  `;
}

function renderTools(d) {
  const tools = d.by_tool || {};
  if (Object.keys(tools).length === 0) {
    document.getElementById('tools').innerHTML = '<div class="empty">도구별 데이터 없음</div>';
    return;
  }
  const rows = Object.entries(tools).map(([tool, b]) => {
    const short = tool.replace('mcp__plugin_claude-mem_mcp-search__', 'mem:').replace('mcp__local-rag__', 'rag:');
    const rcls = rateClass(b.citation_rate);
    const meterPct = Math.round(b.citation_rate * 100);
    return `<tr>
      <td class="tool">${short}</td>
      <td class="num">${b.total}</td>
      <td class="num ${rcls}">${fmtPct(b.citation_rate)}<span class="meter"><span class="meter-fill" style="width:${meterPct}%"></span></span></td>
      <td class="num">${fmtPct(b.empty_rate)}</td>
      <td class="num">${fmtPct(b.error_rate)}</td>
      <td class="num">${b.avg_latency_ms}ms</td>
      <td class="num">${b.avg_result_count}</td>
    </tr>`;
  }).join('');
  document.getElementById('tools').innerHTML = `
    <table>
      <thead><tr>
        <th>도구</th><th>총호출</th><th>citation</th><th>empty</th><th>error</th><th>평균 latency</th><th>평균 결과수</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderDiagnosis(d) {
  const findings = [];
  const overall = d.overall_citation_rate;

  if (overall < 0.3) {
    findings.push('⚠️ 전체 citation rate < 30% — 호출은 하지만 결과를 답변에 거의 인용 안 함. 침묵 실패 가능성 높음.');
  } else if (overall < 0.5) {
    findings.push('⚡ 전체 citation rate < 50% — 절반 이상이 활용되지 않음. 라우팅 키워드 재조정 검토.');
  } else if (overall >= 0.7) {
    findings.push('✅ 전체 citation rate ≥ 70% — 호출이 답변에 잘 반영되고 있음.');
  }

  for (const [tool, b] of Object.entries(d.by_tool || {})) {
    const short = tool.replace('mcp__plugin_claude-mem_mcp-search__', 'mem:').replace('mcp__local-rag__', 'rag:');
    if (b.empty_rate > 0.4) {
      findings.push(`📭 ${short}: empty rate ${fmtPct(b.empty_rate)} — 쿼리 키워드 추출 개선 필요.`);
    }
    if (b.error_rate > 0.1) {
      findings.push(`❌ ${short}: error rate ${fmtPct(b.error_rate)} — 인프라 점검 필요.`);
    }
    if (b.citation_rate < 0.2 && b.total > 5) {
      findings.push(`🔇 ${short}: citation ${fmtPct(b.citation_rate)} — 이 도구 호출이 답변에 거의 안 들어감. 라우팅 재조정 후보.`);
    }
  }

  document.getElementById('diagnosis').innerHTML = findings.length
    ? findings.map(f => '<div>' + f + '</div>').join('')
    : '<div class="empty">특이 신호 없음</div>';
}

reload();
</script>
</body>
</html>
